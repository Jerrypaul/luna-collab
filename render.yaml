services:
  - type: worker
    name: discord-role-cleanup-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: VERIFIED_ROLE_ID
        sync: false
      - key: UNVERIFIED_ROLE_ID
        sync: false
      - key: LIVE_NOW_ROLE_ID
        sync: false
      - key: LIVE_ROLE_DURATION_MS
        value: "7200000"
      - key: LOG_CHANNEL_ID
        sync: false
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: TWITCH_POLL_INTERVAL_MS
        value: "60000"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
